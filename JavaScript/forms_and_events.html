<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="forms_and_events.css" />
    <title>Forms and events</title>
</head>
<body>
    <h1>Forms and events</h1>
    <h2>Factorial</h2>
    <div class="task">
        <label for="number">Введите целое число от 0 до 170:</label>
        <input id="number" type="number" min="0" onchange="Factorial()"/>
        <button onclick="Factorial()">Вычислить</button>
    </div>
    <div id="factorial-result" class="result"></div>
    <hr />
    <script src = "forms_and_events.js"> </script>
</body>
</html>
